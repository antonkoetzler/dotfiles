# =========================
# BASIC SETTINGS
# =========================

# Tabs start at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Faster key response
set -sg escape-time 0

# Enable mouse support (scrolling + selecting tabs)
set -g mouse on


# =========================
# REMOVE DEFAULT PREFIX
# =========================

# Disable Ctrl-b prefix completely
unbind C-b
set -g prefix None


# =========================
# TAB (WINDOW) MANAGEMENT
# =========================

# Ctrl+t → New tab
bind -n C-t new-window

# Ctrl+w → Close tab
bind -n C-w kill-window

# Ctrl+Tab → Next tab
bind -n C-Tab next-window

# Ctrl+Shift+Tab → Previous tab
bind -n C-S-Tab previous-window

# Ctrl+Number → Jump to tab

bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9


# =========================
# SESSION MANAGEMENT
# =========================

# Ctrl+n → New session
bind -n C-n new-session

# Ctrl+q → Detach session
bind -n C-q detach


# =========================
# QUALITY OF LIFE
# =========================

# Reload config instantly
bind -n C-r source-file ~/.tmux.conf

# Better colors
set -g default-terminal "tmux-256color"

# Large scrollback
set -g history-limit 100000
